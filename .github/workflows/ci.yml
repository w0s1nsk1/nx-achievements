name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build

      - name: Run unit tests
        run: ./build/nxachievements-tests

      - name: Run CLI example
        run: |
          mkdir -p tmp
          ./build/nxachievements-test examples/packs/0100000000000000.json ./tmp/unlocked.json

      - name: Run pack-validator smoke test
        run: ./tests/pack-validator-smoke.sh
